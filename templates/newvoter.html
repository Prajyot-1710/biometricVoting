<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter Registration - BioVoting</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modern.css') }}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="{{ url_for('static', filename='js/jquery-1.8.2.js') }}"></script>
    <script src="{{ url_for('static', filename='js/mfs100-9.0.2.6.js') }}"></script>
    <style>
        .registration-container {
            width: 100%;
            max-width: 1000px;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 2rem;
        }

        .form-section-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            color: var(--accent-color);
            font-size: 1.25rem;
            font-weight: 600;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .full-width {
            grid-column: span 2;
        }

        .biometric-capture-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .biometric-preview {
            width: 200px;
            height: 250px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed var(--border-color);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .biometric-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }

        .status-badge {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
        }

        .radio-group {
            display: flex;
            gap: 2rem;
            padding: 0.75rem 0;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .hidden-fields {
            display: none;
        }
    </style>
    <script>
        var quality = 60;
        var timeout = 10;

        function Capture() {
            try {
                document.getElementById('txtStatus').value = "Mock Capture Success";
                document.getElementById('imgFinger').src = "../static/images/finger.jpg";
                document.getElementById('txtIsoTemplate').value = "MOCK_DATA";
                // alert("Finger Captured (Bypass Mode)");
            }
            catch (e) {
                alert(e);
            }
            return false;
        }
    </script>
</head>

<body>
    <form name="form1" method="post" action="/addvoter" class="registration-container">
        <!-- Section 1: Voter Details -->
        <div class="glass-card">
            <div class="form-section-title">
                <i class="fas fa-id-card"></i>
                <span>Personal Information</span>
            </div>

            <div class="form-grid">
                <div class="input-group full-width">
                    <label>Full Name</label>
                    <input name="votername" type="text" class="input-control" id="votername" required
                        pattern="[a-zA-Z\s]+">
                </div>

                <div class="input-group">
                    <label>Voter ID</label>
                    <input name="voterid" type="text" class="input-control" id="voterid" required
                        pattern="[a-zA-Z0-9]+">
                </div>

                <div class="input-group">
                    <label>Age</label>
                    <input name="age" type="number" class="input-control" id="age" min="18" required>
                </div>

                <div class="input-group full-width">
                    <label>Gender</label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="gender" value="Male" checked>
                            <span>Male</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="gender" value="Female">
                            <span>Female</span>
                        </label>
                    </div>
                </div>

                <div class="input-group">
                    <label>Area</label>
                    <input name="area" type="text" class="input-control" id="area" required pattern="[a-zA-Z\s]+">
                </div>

                <div class="input-group">
                    <label>City</label>
                    <input name="city" type="text" class="input-control" id="city" required pattern="[a-zA-Z]+">
                </div>
            </div>

            <div style="margin-top: 3rem; display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-primary" style="flex: 2;">Register Voter</button>
                <button type="reset" class="btn btn-secondary" style="flex: 1;">Reset</button>
                <a href="/div2bak" class="btn btn-secondary"
                    style="text-decoration: none; display: flex; align-items: center; justify-content: center;">
                    Back
                </a>
            </div>
        </div>

        <!-- Section 2: Biometric Capture -->
        <div class="glass-card biometric-capture-zone">
            <div class="form-section-title">
                <i class="fas fa-fingerprint"></i>
                <span>Biometric Enrollment</span>
            </div>

            <div class="biometric-preview">
                <img id="imgFinger" src="" alt="Live Preview" />
            </div>

            <div class="status-badge">
                Status: <span id="currentStatusText" style="color: var(--accent-color);">Ready</span>
            </div>

            <button type="button" class="btn btn-secondary" style="width: 100%; margin-bottom: 1rem;"
                onclick="Capture()">
                <i class="fas fa-barcode-read"></i> Capture Fingerprint
            </button>
            <p style="font-size: 0.75rem; color: var(--text-secondary);">Place index finger on the scanner for
                high-quality enrollment.</p>

            <!-- Hidden compatibility fields -->
            <div class="hidden-fields">
                <input type="text" id="txtStatus" name="txtStatus"
                    onchange="document.getElementById('currentStatusText').innerText = this.value">
                <textarea id="txtIsoTemplate" name="txtIsoTemplate"></textarea>
            </div>
        </div>
    </form>

    <script>
        setInterval(() => {
            const status = document.getElementById('txtStatus').value;
            if (status) {
                document.getElementById('currentStatusText').innerText = status;
            }
        }, 500);
    </script>
    <script>
        {% if msg %}
        alert("{{ msg }}");
        {% endif %}
        {% if err %}
        alert("ERROR: {{ err }}");
        {% endif %}
    </script>
</body>

</html>
