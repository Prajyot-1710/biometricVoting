<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registered Voters - BioVoting</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/modern.css') }}" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    .list-container {
      width: 100%;
      max-width: 1200px;
      padding: 2rem;
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .data-table-wrapper {
      width: 100%;
      overflow-x: auto;
      border-radius: 1rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    .data-table th {
      background: rgba(255, 255, 255, 0.05);
      padding: 1.25rem 1rem;
      font-weight: 600;
      color: var(--accent-color);
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }

    .data-table td {
      padding: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 0.9rem;
    }

    .data-table tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .id-badge {
      font-family: monospace;
      background: rgba(56, 189, 248, 0.1);
      color: var(--accent-color);
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      border: none;
      width: 100%;
    }

    .btn-delete {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.2);
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-delete:hover {
      background: #ef4444;
      color: white;
    }
  </style>
</head>

<body>
  <div class="list-container">
    <header class="list-header">
      <div>
        <h1 class="title-gradient" style="font-size: 2rem; margin: 0;">Voter Directory</h1>
        <p style="color: var(--text-secondary); margin-top: 0.5rem;">Comprehensive list of all registered biometric
          voters.</p>
      </div>
      <a href="/div2bak" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
      </a>
    </header>

    <div class="glass-card data-table-wrapper">
      <table class="data-table">
        <thead>
          <tr>
            <th>Voter Name</th>
            <th>Voter ID</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Area</th>
            <th>City</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          {% for item in data %}
          <tr>
            <td>{{item[1]}}</td>
            <td>
              <form action="delVoter" method="post" style="display: contents;">
                <input name="voteid" type="text" value="{{item[0]}}" readonly class="id-badge">
            </td>
            <td>{{item[2]}}</td>
            <td>{{item[7]}}</td>
            <td>{{item[3]}}</td>
            <td>{{item[4]}}</td>
            <td>
              <button type="submit" class="btn-delete">
                <i class="fas fa-trash-can"></i>
              </button>
              </form>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
  <script>
    {% if msg %}
    alert("{{ msg }}");
    {% endif %}
    {% if err %}
    alert("ERROR: {{ err }}");
    {% endif %}
  </script>
</body>

</html>
